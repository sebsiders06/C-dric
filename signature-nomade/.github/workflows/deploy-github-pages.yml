name: Déploiement GitHub Pages

# Ce workflow publie le dossier dist sur GitHub Pages.
# IMPORTANT (une seule fois) : Repo → Settings → Pages → Source = « GitHub Actions ».

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # npm ci exige package-lock.json — sans lock, utiliser npm install (CI)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      # Base absolue obligatoire sur Pages : sinon ./assets se résout mal sans slash final sur l’URL.
      - name: Base Vite pour GitHub Pages
        id: pages
        run: |
          REPO="${{ github.event.repository.name }}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "vite_base=/" >> "$GITHUB_OUTPUT"
            echo "Site utilisateur : base /"
          else
            echo "vite_base=/$REPO/" >> "$GITHUB_OUTPUT"
            echo "Site projet : base /$REPO/"
          fi

      - name: Build
        run: npm run build
        env:
          CI: true
          NODE_ENV: production
          GITHUB_ACTIONS: true
          DEPLOY_BASE: ${{ steps.pages.outputs.vite_base }}

      - name: Vérifier la sortie
        run: |
          test -f dist/index.html
          test -f dist/404.html
          echo "--- dist/index.html (aperçu) ---"
          head -40 dist/index.html
          echo "--- assets ---"
          ls -la dist/assets/ || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
