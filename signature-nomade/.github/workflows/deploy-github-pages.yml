name: Déploiement GitHub Pages

# Ce workflow publie le dossier dist sur GitHub Pages.
# IMPORTANT (une seule fois) : Repo → Settings → Pages → Source = « GitHub Actions ».
#
# Le dépôt peut être soit « plat » (package.json à la racine), soit avec le site
# dans le sous-dossier signature-nomade/ (structure Desktop/Cédric → GitHub C-dric).

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Localiser le projet (racine ou signature-nomade/)
        id: proj
        run: |
          if [ -f package.json ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
            echo "dist=dist" >> "$GITHUB_OUTPUT"
            echo "lock=package-lock.json" >> "$GITHUB_OUTPUT"
            echo "Projet npm à la racine du dépôt."
          elif [ -f signature-nomade/package.json ]; then
            echo "dir=signature-nomade" >> "$GITHUB_OUTPUT"
            echo "dist=signature-nomade/dist" >> "$GITHUB_OUTPUT"
            echo "lock=signature-nomade/package-lock.json" >> "$GITHUB_OUTPUT"
            echo "Projet npm dans signature-nomade/."
          else
            echo "::error::Aucun package.json trouvé à la racine ni dans signature-nomade/"
            find . -maxdepth 5 -name package.json -print 2>/dev/null || true
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ steps.proj.outputs.lock }}

      - name: Install dependencies
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      # Base absolue obligatoire sur Pages : sinon ./assets se résout mal sans slash final sur l’URL.
      - name: Base Vite pour GitHub Pages
        id: pages
        run: |
          REPO="${{ github.event.repository.name }}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "vite_base=/" >> "$GITHUB_OUTPUT"
            echo "Site utilisateur : base /"
          else
            echo "vite_base=/$REPO/" >> "$GITHUB_OUTPUT"
            echo "Site projet : base /$REPO/"
          fi

      - name: Build
        working-directory: ${{ steps.proj.outputs.dir }}
        run: npm run build
        env:
          CI: true
          NODE_ENV: production
          GITHUB_ACTIONS: true
          DEPLOY_BASE: ${{ steps.pages.outputs.vite_base }}

      - name: Vérifier la sortie
        run: |
          test -f "${{ steps.proj.outputs.dist }}/index.html"
          test -f "${{ steps.proj.outputs.dist }}/404.html"
          echo "--- dist/index.html (aperçu) ---"
          head -40 "${{ steps.proj.outputs.dist }}/index.html"
          echo "--- assets ---"
          ls -la "${{ steps.proj.outputs.dist }}/assets/" || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.proj.outputs.dist }}

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
